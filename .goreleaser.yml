version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ikno
    binary: ikno
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: ikno
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance Improvements
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: charemma
    name: ikno
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## ikno {{ .Tag }}

    A local, text-first CLI tool that helps you remember what you actually did.
  footer: |
    **Full Changelog**: https://github.com/charemma/ikno/compare/{{ .PreviousTag }}...{{ .Tag }}

    ## Installation

    ### macOS/Linux
    ```bash
    # Download and extract
    curl -L https://github.com/charemma/ikno/releases/download/{{ .Tag }}/ikno_{{ .Tag }}_$(uname -s)_$(uname -m).tar.gz | tar xz

    # Move to PATH
    sudo mv ikno /usr/local/bin/
    ```

    ### Go Install
    ```bash
    go install github.com/charemma/ikno@{{ .Tag }}
    ```

